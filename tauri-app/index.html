<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ささやき女将</title>
    <style>
      html,
      body {
        background: #1f1f26;
        color: #f5f5f8;
      }
      html[data-theme="light"],
      html[data-theme="light"] body {
        background: #f5ede0;
        color: #2a1f18;
      }
    </style>
    <script>
      // Pick up the saved theme before paint to avoid a dark→light flash.
      try {
        var t = localStorage.getItem("sasayaki-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
